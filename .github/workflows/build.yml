name: Build PetVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install missing SDK components into pre-installed SDK
        run: |
          # Use the runner's pre-installed ANDROID_HOME — do NOT set ANDROID_SDK_ROOT
          echo "Using ANDROID_HOME: $ANDROID_HOME"
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools"     >> $GITHUB_PATH

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore petvault.jks \
            -alias petvault \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass petvault123 \
            -keypass petvault123 \
            -dname "CN=PetVault, OU=App, O=PetVault, L=City, S=State, C=US"

      - name: Build Android project from scratch
        run: |
          # ── Directory structure ──────────────────────────────────
          mkdir -p PetVaultApp/app/src/main/java/com/petvault/app
          mkdir -p PetVaultApp/app/src/main/assets
          mkdir -p PetVaultApp/app/src/main/res/values
          mkdir -p PetVaultApp/app/src/main/res/mipmap-hdpi
          mkdir -p PetVaultApp/app/src/main/res/mipmap-mdpi
          mkdir -p PetVaultApp/app/src/main/res/mipmap-xhdpi
          mkdir -p PetVaultApp/app/src/main/res/mipmap-xxhdpi
          mkdir -p PetVaultApp/gradle/wrapper

          # ── Copy game HTML ───────────────────────────────────────
          cp index.html PetVaultApp/app/src/main/assets/index.html

          # ── settings.gradle ──────────────────────────────────────
          cat > PetVaultApp/settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "PetVault"
include ':app'
EOF

          # ── root build.gradle ────────────────────────────────────
          cat > PetVaultApp/build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.2.2' apply false
}
EOF

          # ── app/build.gradle ─────────────────────────────────────
          cat > PetVaultApp/app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
}
android {
    namespace 'com.petvault.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.petvault.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        release {
            storeFile file("../../../../petvault.jks")
            storePassword "petvault123"
            keyAlias "petvault"
            keyPassword "petvault123"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
EOF

          # ── Gradle wrapper properties ────────────────────────────
          cat > PetVaultApp/gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

          # ── gradlew shim ─────────────────────────────────────────
          cat > PetVaultApp/gradlew << 'GRADLEW'
#!/bin/sh
exec gradle "$@"
GRADLEW
          chmod +x PetVaultApp/gradlew

          # ── AndroidManifest.xml ──────────────────────────────────
          cat > PetVaultApp/app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="PetVault"
        android:supportsRtl="true"
        android:theme="@style/AppTheme"
        android:usesCleartextTraffic="true">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

          # ── MainActivity.java ────────────────────────────────────
          cat > PetVaultApp/app/src/main/java/com/petvault/app/MainActivity.java << 'EOF'
package com.petvault.app;

import android.app.Activity;
import android.os.Bundle;
import android.view.View;
import android.view.WindowManager;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.webkit.WebChromeClient;

public class MainActivity extends Activity {

    private WebView webView;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);

        getWindow().setFlags(
            WindowManager.LayoutParams.FLAG_FULLSCREEN,
            WindowManager.LayoutParams.FLAG_FULLSCREEN
        );
        getWindow().getDecorView().setSystemUiVisibility(
            View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
            View.SYSTEM_UI_FLAG_FULLSCREEN |
            View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
        );

        webView = new WebView(this);
        setContentView(webView);

        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setAllowFileAccessFromFileURLs(true);
        settings.setAllowUniversalAccessFromFileURLs(true);
        settings.setMediaPlaybackRequiresUserGesture(false);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);

        webView.setWebViewClient(new WebViewClient());
        webView.setWebChromeClient(new WebChromeClient());
        webView.loadUrl("file:///android_asset/index.html");
    }

    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) {
            webView.goBack();
        } else {
            super.onBackPressed();
        }
    }
}
EOF

          # ── res/values/styles.xml ────────────────────────────────
          cat > PetVaultApp/app/src/main/res/values/styles.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
        <item name="android:windowBackground">#0d0720</item>
        <item name="android:statusBarColor">#0d0720</item>
        <item name="android:navigationBarColor">#0d0720</item>
    </style>
</resources>
EOF

          # ── Launcher icons via Python ─────────────────────────────
          python3 - << 'PYEOF'
import struct, zlib, os

def make_png(size, bg, fg):
    def chunk(name, data):
        c = zlib.crc32(name + data) & 0xffffffff
        return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
    sig = b'\x89PNG\r\n\x1a\n'
    ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
    rows = []
    for y in range(size):
        row = b'\x00'
        for x in range(size):
            dx, dy = x - size//2, y - size//2
            dist = (dx*dx + dy*dy) ** 0.5
            if dist <= size*0.46:
                t = max(0, 1 - dist/(size*0.46))
                r = int(bg[0] + (fg[0]-bg[0])*t)
                g = int(bg[1] + (fg[1]-bg[1])*t)
                b = int(bg[2] + (fg[2]-bg[2])*t)
                row += bytes([r, g, b])
            else:
                row += bytes(bg)
        rows.append(row)
    raw = b''.join(rows)
    idat = chunk(b'IDAT', zlib.compress(raw))
    iend = chunk(b'IEND', b'')
    return sig + ihdr + idat + iend

configs = [
    ('mipmap-mdpi',   48,  (13,7,32), (162,155,254)),
    ('mipmap-hdpi',   72,  (13,7,32), (162,155,254)),
    ('mipmap-xhdpi',  96,  (13,7,32), (162,155,254)),
    ('mipmap-xxhdpi', 144, (13,7,32), (162,155,254)),
]
for folder, size, bg, fg in configs:
    path = f'PetVaultApp/app/src/main/res/{folder}/ic_launcher.png'
    os.makedirs(os.path.dirname(path), exist_ok=True)
    with open(path, 'wb') as f:
        f.write(make_png(size, bg, fg))
print('Icons generated.')
PYEOF

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build release APK
        working-directory: PetVaultApp
        run: |
          # Use ANDROID_HOME only — never set ANDROID_SDK_ROOT
          gradle assembleRelease --no-daemon --stacktrace

      - name: Locate and copy APK
        run: |
          APK=$(find PetVaultApp -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" PetVault-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetVault-APK
          path: PetVault-signed.apk
          retention-days: 30
