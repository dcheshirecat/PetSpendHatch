name: Build PetVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform and build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore petvault.jks \
            -alias petvault \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass petvault123 -keypass petvault123 \
            -dname "CN=PetVault,O=PetVault,C=US" -noprompt

      - name: Generate Android project files
        run: |
          python3 << 'PYEOF'
          import os, shutil, struct, zlib

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content)

          def write_bin(path, data):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(data)

          B = "PetVaultApp"

          write(f"{B}/settings.gradle",
          "pluginManagement {\n"
          "    repositories { google(); mavenCentral(); gradlePluginPortal() }\n"
          "}\n"
          "dependencyResolutionManagement {\n"
          "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n"
          "    repositories { google(); mavenCentral() }\n"
          "}\n"
          "rootProject.name = 'PetVault'\n"
          "include ':app'\n")

          write(f"{B}/build.gradle",
          "plugins {\n"
          "    id 'com.android.application' version '8.2.2' apply false\n"
          "}\n")

          write(f"{B}/app/build.gradle",
          "plugins {\n"
          "    id 'com.android.application'\n"
          "}\n"
          "android {\n"
          "    namespace 'com.petvault.app'\n"
          "    compileSdk 34\n"
          "    defaultConfig {\n"
          "        applicationId 'com.petvault.app'\n"
          "        minSdk 24\n"
          "        targetSdk 34\n"
          "        versionCode 1\n"
          "        versionName '1.0'\n"
          "    }\n"
          "    signingConfigs {\n"
          "        release {\n"
          "            storeFile file('../../../../petvault.jks')\n"
          "            storePassword 'petvault123'\n"
          "            keyAlias 'petvault'\n"
          "            keyPassword 'petvault123'\n"
          "        }\n"
          "    }\n"
          "    buildTypes {\n"
          "        release {\n"
          "            minifyEnabled false\n"
          "            signingConfig signingConfigs.release\n"
          "        }\n"
          "    }\n"
          "    compileOptions {\n"
          "        sourceCompatibility JavaVersion.VERSION_17\n"
          "        targetCompatibility JavaVersion.VERSION_17\n"
          "    }\n"
          "}\n"
          "dependencies {\n"
          "    implementation 'androidx.appcompat:appcompat:1.6.1'\n"
          "}\n")

          write(f"{B}/gradle/wrapper/gradle-wrapper.properties",
          "distributionBase=GRADLE_USER_HOME\n"
          "distributionPath=wrapper/dists\n"
          "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n"
          "zipStoreBase=GRADLE_USER_HOME\n"
          "zipStorePath=wrapper/dists\n")

          write(f"{B}/gradlew", "#!/bin/sh\nexec gradle \"$@\"\n")
          os.chmod(f"{B}/gradlew", 0o755)

          assets_dir = f"{B}/app/src/main/assets"
          os.makedirs(assets_dir, exist_ok=True)
          shutil.copy("index.html", f"{assets_dir}/index.html")

          write(f"{B}/app/src/main/AndroidManifest.xml",
          '<?xml version="1.0" encoding="utf-8"?>\n'
          '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n'
          '    <uses-permission android:name="android.permission.INTERNET"/>\n'
          '    <application\n'
          '        android:allowBackup="true"\n'
          '        android:icon="@mipmap/ic_launcher"\n'
          '        android:label="PetVault"\n'
          '        android:supportsRtl="true"\n'
          '        android:theme="@style/AppTheme"\n'
          '        android:usesCleartextTraffic="true">\n'
          '        <activity\n'
          '            android:name=".MainActivity"\n'
          '            android:exported="true"\n'
          '            android:configChanges="orientation|screenSize|keyboardHidden"\n'
          '            android:screenOrientation="portrait"\n'
          '            android:windowSoftInputMode="adjustResize">\n'
          '            <intent-filter>\n'
          '                <action android:name="android.intent.action.MAIN"/>\n'
          '                <category android:name="android.intent.category.LAUNCHER"/>\n'
          '            </intent-filter>\n'
          '        </activity>\n'
          '    </application>\n'
          '</manifest>\n')

          write(f"{B}/app/src/main/java/com/petvault/app/MainActivity.java",
          "package com.petvault.app;\n"
          "import android.app.Activity;\n"
          "import android.os.Bundle;\n"
          "import android.view.View;\n"
          "import android.view.WindowManager;\n"
          "import android.webkit.WebSettings;\n"
          "import android.webkit.WebView;\n"
          "import android.webkit.WebViewClient;\n"
          "import android.webkit.WebChromeClient;\n"
          "public class MainActivity extends Activity {\n"
          "    private WebView webView;\n"
          "    @Override\n"
          "    protected void onCreate(Bundle savedInstanceState) {\n"
          "        super.onCreate(savedInstanceState);\n"
          "        getWindow().setFlags(\n"
          "            WindowManager.LayoutParams.FLAG_FULLSCREEN,\n"
          "            WindowManager.LayoutParams.FLAG_FULLSCREEN);\n"
          "        getWindow().getDecorView().setSystemUiVisibility(\n"
          "            View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |\n"
          "            View.SYSTEM_UI_FLAG_FULLSCREEN |\n"
          "            View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);\n"
          "        webView = new WebView(this);\n"
          "        setContentView(webView);\n"
          "        WebSettings s = webView.getSettings();\n"
          "        s.setJavaScriptEnabled(true);\n"
          "        s.setDomStorageEnabled(true);\n"
          "        s.setAllowFileAccess(true);\n"
          "        s.setAllowFileAccessFromFileURLs(true);\n"
          "        s.setAllowUniversalAccessFromFileURLs(true);\n"
          "        s.setMediaPlaybackRequiresUserGesture(false);\n"
          "        s.setCacheMode(WebSettings.LOAD_DEFAULT);\n"
          "        webView.setWebViewClient(new WebViewClient());\n"
          "        webView.setWebChromeClient(new WebChromeClient());\n"
          "        webView.loadUrl(\"file:///android_asset/index.html\");\n"
          "    }\n"
          "    @Override\n"
          "    public void onBackPressed() {\n"
          "        if (webView.canGoBack()) webView.goBack();\n"
          "        else super.onBackPressed();\n"
          "    }\n"
          "}\n")

          write(f"{B}/app/src/main/res/values/styles.xml",
          '<?xml version="1.0" encoding="utf-8"?>\n'
          '<resources>\n'
          '    <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">\n'
          '        <item name="android:windowBackground">#0d0720</item>\n'
          '        <item name="android:statusBarColor">#0d0720</item>\n'
          '        <item name="android:navigationBarColor">#0d0720</item>\n'
          '    </style>\n'
          '</resources>\n')

          def make_png(size, bg, fg):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              rows = []
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      dx, dy = x - size//2, y - size//2
                      dist = (dx*dx + dy*dy) ** 0.5
                      if dist <= size*0.46:
                          t = max(0, 1 - dist/(size*0.46))
                          row += bytes([int(bg[i]+(fg[i]-bg[i])*t) for i in range(3)])
                      else:
                          row += bytes(bg)
                  rows.append(row)
              raw = b''.join(rows)
              return sig + ihdr + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144)]:
              write_bin(f"{B}/app/src/main/res/{folder}/ic_launcher.png",
                        make_png(size, (13,7,32), (162,155,254)))

          print("All project files generated successfully.")
          PYEOF

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build release APK
        working-directory: PetVaultApp
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Copy APK to workspace root
        run: |
          APK=$(find PetVaultApp -name "*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" PetVault-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetVault-APK
          path: PetVault-signed.apk
          retention-days: 30
