name: Build PetVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install missing SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore petvault.jks \
            -alias petvault \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass petvault123 -keypass petvault123 \
            -dname "CN=PetVault,O=PetVault,C=US" -noprompt

      - name: Generate Android project files
        run: |
          python3 << 'PYEOF'
          import os

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content)

          def write_bin(path, data):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'wb') as f:
                  f.write(data)

          BASE = "PetVaultApp"

          # settings.gradle
          write(f"{BASE}/settings.gradle", """
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "PetVault"
          include ':app'
          """.strip())

          # root build.gradle
          write(f"{BASE}/build.gradle", """
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          """.strip())

          # app/build.gradle
          write(f"{BASE}/app/build.gradle", """
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.petvault.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.petvault.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../../../../petvault.jks")
                      storePassword "petvault123"
                      keyAlias "petvault"
                      keyPassword "petvault123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          """.strip())

          # gradle-wrapper.properties
          write(f"{BASE}/gradle/wrapper/gradle-wrapper.properties",
          "distributionBase=GRADLE_USER_HOME\n"
          "distributionPath=wrapper/dists\n"
          "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n"
          "zipStoreBase=GRADLE_USER_HOME\n"
          "zipStorePath=wrapper/dists\n")

          # gradlew shim
          write(f"{BASE}/gradlew", "#!/bin/sh\nexec gradle \"$@\"\n")
          os.chmod(f"{BASE}/gradlew", 0o755)

          # Copy game HTML
          import shutil
          shutil.copy("index.html", f"{BASE}/app/src/main/assets/index.html")

          # AndroidManifest.xml
          write(f"{BASE}/app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="PetVault"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>""")

          # MainActivity.java
          write(f"{BASE}/app/src/main/java/com/petvault/app/MainActivity.java", """package com.petvault.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  webView = new WebView(this);
                  setContentView(webView);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }""")

          # styles.xml
          write(f"{BASE}/app/src/main/res/values/styles.xml", """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0d0720</item>
                  <item name="android:statusBarColor">#0d0720</item>
                  <item name="android:navigationBarColor">#0d0720</item>
              </style>
          </resources>""")

          # Launcher icons
          import struct, zlib

          def make_png(size, bg, fg):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              rows = []
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      dx, dy = x - size//2, y - size//2
                      dist = (dx*dx + dy*dy) ** 0.5
                      if dist <= size*0.46:
                          t = max(0, 1 - dist/(size*0.46))
                          row += bytes([int(bg[i]+(fg[i]-bg[i])*t) for i in range(3)])
                      else:
                          row += bytes(bg)
                  rows.append(row)
              raw = b''.join(rows)
              return sig + ihdr + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          for folder, size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144)]:
              write_bin(f"{BASE}/app/src/main/res/{folder}/ic_launcher.png",
                        make_png(size, (13,7,32), (162,155,254)))

          print("All project files generated.")
          PYEOF

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build release APK
        working-directory: PetVaultApp
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Copy APK to workspace root
        run: |
          APK=$(find PetVaultApp -name "*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" PetVault-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetVault-APK
          path: PetVault-signed.apk
          retention-days: 30
